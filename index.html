<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
	<title>reveal.js</title>
	<link rel="stylesheet" href="dist/reset.css" />
	<link rel="stylesheet" href="dist/reveal.css" />
	<link rel="stylesheet" href="dist/theme/black.css" />
	<link rel="stylesheet" href="dist/plugin/highlight/monokai.css" />
	<link rel="stylesheet" href="shadow_main.css" />
	<style>
		#bg-video {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			object-fit: cover;
			z-index: 0;
		}

		.reveal {
			z-index: 1;
		}

		.reveal .slides section {
			top: 0 !important;
			height: 100%;
			padding: 0 !important;
			/* <-- THIS fixes the offset */
		}
	</style>
</head>

<body>

	<video id="bg-video" src="render.mp4" autoplay muted playsinline></video>

	<div class="reveal">
		<div class="slides">
			<section data-loop-start="0" data-loop-end="7.500">
				<p
					style="position: absolute; top: 0; left: 0; width: 100%; margin: 10vh 0vh 0vh 0vh; font-size: 2.5em;">
					САЩ и Канада.
				</p>
				<p
					style="position: absolute; bottom: 0; left: 0; width: 100%; margin: 0vh 0vh 10vh 0vh; font-size: 0.8em;">
					Презентация от Калоян Донев, Пламен Петров и Стоян Ничев.
				</p>
			</section>
			<section data-loop-start="7.500" data-loop-end="13.900" data-no-loop>
				<div class="shadow_main" style="
  					background-color: white;
  					position: absolute;
  					bottom: 0;
  					left: 50%;
  					transform: translateX(-50%);
  					width: 70%;
					margin-bottom: 2.5vh;
					border-radius: 15px;
					color: black;
				">
					<p>САЩ граничи с Канада на север и с Мексико на юг.</p>
				</div>
			</section>
			<section data-loop-start="13.900" data-loop-end="16.00" data-no-loop></section>
			<section data-loop-start="16.00" data-loop-end="39.700">
				<div
					style="position: absolute; bottom: 0; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 2.5vh 2.5vh 2.5vh; box-sizing: border-box; gap: 2.5vh;">

					<div class="shadow_main"
						style="background-color: white; border-radius: 15px; color: black; width: 30%; min-height: 96vh;">

						<div style="height: 40vh;">
							<canvas data-chart="pie">
								<!--
  {
    "data": {
      "labels": ["Forests", "Oceans", "Deserts", "Other"],
      "datasets": [{
        "data": [30, 40, 20, 10],
        "backgroundColor": ["#2ecc71", "#3498db", "#e67e22", "#9b59b6"]
      }]
    },
    "options": {
      "animation": { "duration": 1000 }
    }
  }
  -->
							</canvas>
						</div>
					</div>

					<div class="shadow_main"
						style="background-color: white; border-radius: 15px; color: black; width: 30%; min-height: 96vh;">
						<p>Десен панел</p>
					</div>

				</div>
			</section>
			<section data-loop-start="39.600" data-loop-end="43.850" data-no-loop></section>
			<section data-loop-start="44.100" data-loop-end="70">USA: SECTOR 2</section>
			<section data-loop-start="70" data-loop-end="74" data-no-loop></section>
			<section data-loop-start="74" data-loop-end="98.800">USA: SECTOR 3</section>
			<section data-loop-start="98.800" data-loop-end="105" data-no-loop></section>
			<section data-loop-start="105" data-loop-end="111.900">CANADA BORDERS</section>
			<section data-loop-start="111.900" data-loop-end="115" data-no-loop></section>
			<section data-loop-start="115" data-loop-end="149">CANADA: SECTOR 1</section>
			<section data-loop-start="149" data-loop-end="152.390" data-no-loop></section>
			<section data-loop-start="152.390" data-loop-end="175.550">CANADA: SECTOR 2</section>
			<section data-loop-start="175.650" data-loop-end="180" data-no-loop></section>
			<section data-loop-start="180" data-loop-end="207">CANADA: SECTOR 3</section>
		</div>
	</div>

	<script src="dist/reveal.js"></script>
	<script src="dist/plugin/notes.js"></script>
	<script src="dist/plugin/markdown.js"></script>
	<script src="dist/plugin/highlight.js"></script>
	<script src="node_modules/chart.js/dist/chart.umd.js"></script>
	<script src="reveal.js-plugins/chart/plugin.js"></script>
	<script>
		const video = document.getElementById('bg-video');

		function applySlide(slide) {
			video.ontimeupdate = null;
			video.onended = null; // <-- clear this too

			const start = parseFloat(slide.dataset.loopStart);
			const end = parseFloat(slide.dataset.loopEnd);
			const noLoop = slide.dataset.noLoop !== undefined;

			video.currentTime = start;
			video.play();

			video.ontimeupdate = () => {
				if (video.currentTime >= end) {
					if (noLoop) {
						video.pause();
						video.ontimeupdate = null;
					} else {
						video.currentTime = start;
					}
				}
			};

			// handles the case where the video file itself ends
			video.onended = () => {
				if (!noLoop) {
					video.currentTime = start;
					video.play();
				}
			};
		}

		Reveal.initialize({
			width: "100%",
			height: "100%",
			margin: 0,
			minScale: 1,
			maxScale: 1,
			plugins: [RevealChart, RevealNotes, RevealMarkdown, RevealHighlight]
		}).then(() => {
			Reveal.on('slidechanged', event => applySlide(event.currentSlide));

			const startOnReady = () => applySlide(Reveal.getCurrentSlide());
			if (video.readyState >= 1) {
				startOnReady();
			} else {
				video.addEventListener('loadedmetadata', startOnReady);
			}
		});
	</script>

</body>

</html>
